services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: slmp_01_app
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8080
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: slmp_01
      DB_USERNAME: slmp
      DB_PASSWORD: secret
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: your-gmail@example.com
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_SCHEME: tls
      MAIL_FROM_ADDRESS: hello@example.com
      MAIL_FROM_NAME: slmp_01
      JSONPLACEHOLDER_BASE_URL: https://jsonplaceholder.typicode.com
      JSONPLACEHOLDER_TIMEOUT: 15
      JSONPLACEHOLDER_RETRY_TIMES: 3
      JSONPLACEHOLDER_RETRY_SLEEP_MS: 500
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "test -f /tmp/slmp-ready"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  nginx:
    image: nginx:1.27-alpine
    container_name: slmp_01_nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: slmp_01_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: slmp_01
      MYSQL_USER: slmp
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mysql_data:
  vendor_data:
